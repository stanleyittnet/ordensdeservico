<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard O.S - Supabase | ITTNET</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.login-box { background: white; padding: 30px; border-radius: 16px; max-width: 400px; margin: 50px auto; }
.login-box input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
.login-box button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
.topbar { background: rgba(47, 62, 70, 0.95); color: white; padding: 15px; display: flex; justify-content: space-between; border-radius: 12px; margin-bottom: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; cursor: pointer; border-left: 5px solid #007bff; }
.card.lider { border-left-color: #ffc107; }
.ranking-container { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.ranking-item { display: flex; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; }
.ranking-medal { font-size: 24px; margin-right: 15px; width: 35px; text-align: center; }
.ranking-value { background: #667eea; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
.ranking-value.leader { background: #ffc107; color: #333; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; margin-top: 20px; }
th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px; }
td { padding: 10px; border-bottom: 1px solid #eee; }
button { padding: 8px 16px; margin: 3px; cursor: pointer; border: none; border-radius: 6px; font-weight: 600; }
.btn-success { background: #28a745; color: white; }
.btn-danger { background: #dc3545; color: white; }
.btn-warning { background: #ffc107; color: #333; }
.btn-info { background: #17a2b8; color: white; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.hidden { display: none !important; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.modal-content { background: white; padding: 25px; border-radius: 12px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
.form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; }
.loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 9999; color: white; font-size: 18px; }
.funcao-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
.funcao-lider { background: #ffc107; color: #333; }
.funcao-auxiliar { background: #17a2b8; color: white; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; }
.stat-value { font-size: 28px; font-weight: bold; }
.stat-label { color: #666; margin-top: 5px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2 style="text-align:center;margin-bottom:20px;">ITTNET - Supabase</h2>
    <input type="text" id="loginUsuario" placeholder="Usuário" value="admin">
    <input type="password" id="loginSenha" placeholder="Senha" value="admin123">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="loginError" style="color:red;text-align:center;margin-top:15px;display:none;">Usuário ou senha inválidos</p>
    <p style="text-align:center;margin-top:15px;font-size:12px;color:#666;">admin / admin123 (ADMIN)<br>julio / 123 (Técnico)</p>
  </div>
</div>

<!-- SISTEMA -->
<div id="appContainer" class="hidden">
  <div class="topbar">
    <h2>ITTNET <span id="userType" style="font-size:14px;margin-left:10px;"></span></h2>
    <div>
      <button class="btn-info" id="configBtn" onclick="abrirModalConfig()">⚙️ Configurações</button>
      <button class="btn-danger" onclick="fazerLogout()">🚪 Sair</button>
    </div>
  </div>

  <div class="container">
    <!-- TELA INICIAL -->
    <div id="home">
      <h2 style="color:white;margin-bottom:15px;">Selecione o Técnico</h2>
      
      <!-- RANKING -->
      <div class="ranking-container">
        <h3 style="margin-bottom:15px;">🏆 Ranking por quantidade de O.S</h3>
        <div id="rankingList"></div>
      </div>
      
      <!-- CARDS DOS TÉCNICOS -->
      <div id="listaTecnicos"></div>
    </div>

    <!-- PAINEL DO TÉCNICO -->
    <div id="painel" class="hidden">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
        <button class="btn-primary" onclick="voltarHome()">⬅ Voltar</button>
        <h2 style="color:white;" id="nomeTecnicoPainel"></h2>
        <div>
          <button class="btn-success" onclick="abrirFormOS()">➕ Nova OS</button>
          <button class="btn-danger" id="btnExcluirSelecionados" onclick="excluirSelecionados()" disabled>🗑 Excluir</button>
        </div>
      </div>

      <!-- ESTATÍSTICAS -->
      <div class="stats-grid" id="statsContainer"></div>

      <!-- TABELA DE OS -->
      <div style="background:white;border-radius:12px;padding:20px;">
        <h3 style="margin-bottom:15px;">Ordens de Serviço</h3>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th width="40"><input type="checkbox" id="checkboxTodos" onclick="selecionarTodos(this)"></th>
                <th>OS</th><th>Data</th><th>Assunto</th><th>Cidade</th><th>Comissão</th><th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONFIGURAÇÕES -->
<div id="modalConfig" class="modal hidden">
  <div class="modal-content">
    <h3>⚙️ Configurações</h3>
    <div style="display:flex;gap:10px;margin:15px 0;">
      <button class="btn-info" onclick="mostrarSecao('tecnicos')">Técnicos</button>
      <button class="btn-info" onclick="mostrarSecao('assuntos')">Assuntos</button>
      <button class="btn-info" onclick="mostrarSecao('cidades')">Cidades</button>
      <button class="btn-info" onclick="mostrarSecao('usuarios')">Usuários</button>
    </div>
    
    <div id="secaoTecnicos">
      <button class="btn-success" onclick="abrirFormTecnico()" style="width:100%;margin-bottom:15px;">➕ Novo Técnico</button>
      <div id="listaTecnicosConfig"></div>
    </div>
    
    <div id="secaoAssuntos" class="hidden">
      <button class="btn-success" onclick="abrirFormAssunto()" style="width:100%;margin-bottom:15px;">➕ Novo Assunto</button>
      <div id="listaAssuntosConfig"></div>
    </div>
    
    <div id="secaoCidades" class="hidden">
      <button class="btn-success" onclick="abrirFormCidade()" style="width:100%;margin-bottom:15px;">➕ Nova Cidade</button>
      <div id="listaCidadesConfig"></div>
    </div>
    
    <div id="secaoUsuarios" class="hidden">
      <button class="btn-success" onclick="abrirFormUsuario()" style="width:100%;margin-bottom:15px;">➕ Novo Usuário</button>
      <div id="listaUsuariosConfig"></div>
    </div>
    
    <button onclick="fecharModalConfig()" style="margin-top:15px;">Fechar</button>
  </div>
</div>

<!-- MODAL FORM OS -->
<div id="modalOS" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloOS">Nova OS</h3>
    <input type="hidden" id="editOSId">
    <div class="form-group">
      <label>Nº OS</label>
      <input type="text" id="osIdInput">
    </div>
    <div class="form-group">
      <label>Data</label>
      <input type="date" id="osDataInput">
    </div>
    <div class="form-group">
      <label>Assunto</label>
      <select id="osAssuntoSelect"></select>
    </div>
    <div class="form-group">
      <label>Cidade</label>
      <select id="osCidadeSelect"></select>
    </div>
    <div class="form-group">
      <label>Comissão (R$)</label>
      <input type="number" id="osComissaoInput" step="0.01">
    </div>
    <button class="btn-success" onclick="salvarOS()">Salvar</button>
    <button onclick="fecharModalOS()">Cancelar</button>
  </div>
</div>

<!-- MODAIS DE CRUD (Técnicos, Assuntos, Cidades, Usuários) -->
<div id="modalTecnico" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloTecnico">Novo Técnico</h3>
    <input type="hidden" id="editTecnicoNome">
    <div class="form-group"><label>Nome</label><input type="text" id="nomeTecnicoInput"></div>
    <div class="form-group"><label>Função</label><select id="funcaoTecnicoSelect"><option value="Líder">Líder</option><option value="Auxiliar">Auxiliar</option></select></div>
    <button class="btn-success" onclick="salvarTecnico()">Salvar</button>
    <button onclick="fecharModalTecnico()">Cancelar</button>
  </div>
</div>

<div id="modalAssunto" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloAssunto">Novo Assunto</h3>
    <input type="hidden" id="editAssuntoNome">
    <div class="form-group"><label>Nome</label><input type="text" id="nomeAssuntoInput"></div>
    <div class="form-group"><label>Valor</label><input type="number" id="valorAssuntoInput" step="0.01"></div>
    <button class="btn-success" onclick="salvarAssunto()">Salvar</button>
    <button onclick="fecharModalAssunto()">Cancelar</button>
  </div>
</div>

<div id="modalCidade" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloCidade">Nova Cidade</h3>
    <input type="hidden" id="editCidadeNome">
    <div class="form-group"><label>Nome</label><input type="text" id="nomeCidadeInput"></div>
    <button class="btn-success" onclick="salvarCidade()">Salvar</button>
    <button onclick="fecharModalCidade()">Cancelar</button>
  </div>
</div>

<div id="modalUsuario" class="modal hidden">
  <div class="modal-content">
    <h3 id="tituloUsuario">Novo Usuário</h3>
    <input type="hidden" id="editUsuarioNome">
    <div class="form-group"><label>Usuário</label><input type="text" id="usuarioInput"></div>
    <div class="form-group"><label>Senha</label><input type="password" id="senhaInput"></div>
    <div class="form-group"><label>Tipo</label><select id="tipoUsuarioSelect"><option value="admin">Admin</option><option value="tecnico" selected>Técnico</option></select></div>
    <div class="form-group"><label>Vincular a técnico</label><select id="tecnicoVinculadoSelect"><option value="">Nenhum</option></select></div>
    <button class="btn-success" onclick="salvarUsuario()">Salvar</button>
    <button onclick="fecharModalUsuario()">Cancelar</button>
  </div>
</div>

<div id="loadingOverlay" class="loading hidden"></div>

<script>
// ==================== CONFIGURAÇÃO SUPABASE ====================
const SUPABASE_URL = 'https://yehnwtkvpcywatfsgpmt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Z35TOMGYM-fK1PnQi6ulGA_zLe5FhfO';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== DADOS GLOBAIS ====================
let usuarioLogado = null;
let tecnicos = [];
let assuntosMap = {};
let cidades = [];
let usuarios = [];
let dados = []; // Todas as OS
let tecnicoSelecionado = null;

// ==================== UTILITÁRIOS ====================
function showLoading(msg) { document.getElementById('loadingOverlay').innerHTML = `🔄 ${msg}`; document.getElementById('loadingOverlay').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// ==================== LOGIN ====================
async function fazerLogin() {
  const u = document.getElementById('loginUsuario').value.trim();
  const s = document.getElementById('loginSenha').value;
  
  showLoading('Autenticando...');
  
  // Carregar usuários
  const { data: usrData } = await supabaseClient.from('usuarios').select('*');
  if (usrData) usuarios = usrData;
  if (!usuarios.find(x => x.usuario === 'admin')) {
    usuarios.push({ usuario: 'admin', senha: 'admin123', tipo: 'admin', tecnico_vinculado: null });
    usuarios.push({ usuario: 'julio', senha: '123', tipo: 'tecnico', tecnico_vinculado: 'JULIO CESAR PEREIRA DO LIVRAMENTO' });
  }
  
  const user = usuarios.find(x => x.usuario === u && x.senha === s);
  if (!user) { document.getElementById('loginError').style.display = 'block'; hideLoading(); return; }
  
  usuarioLogado = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appContainer').classList.remove('hidden');
  document.getElementById('userType').textContent = `(${user.tipo === 'admin' ? 'ADMIN' : 'Técnico'})`;
  document.getElementById('configBtn').style.display = user.tipo === 'admin' ? 'inline-block' : 'none';
  
  await carregarDadosIniciais();
  hideLoading();
}

function fazerLogout() {
  usuarioLogado = null;
  document.getElementById('appContainer').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ==================== CARREGAR DADOS ====================
async function carregarDadosIniciais() {
  // Carregar OS
  const { data: osData } = await supabaseClient.from('os').select('*').order('data', { ascending: false });
  if (osData) {
    dados = osData.map(row => ({
      id: row.id, equipe: row.equipe ? row.equipe.split('/').map(t => t.trim().toUpperCase()) : [],
      assunto: row.assunto, data: row.data, cidade: row.cidade, comissao: row.comissao
    }));
  }
  
  // Carregar Técnicos
  const { data: tecData } = await supabaseClient.from('tecnicos').select('*');
  if (tecData) tecnicos = tecData;
  if (tecnicos.length === 0) {
    tecnicos = [
      { nome: "JULIO CESAR PEREIRA DO LIVRAMENTO", ativo: true, funcao: "Líder", apelido: "JULIO" },
      { nome: "JOSE ALBERNEY CARVALHO SILVA", ativo: true, funcao: "Auxiliar", apelido: "JOSÉ ALBERNEY" }
    ];
  }
  
  // Carregar Assuntos
  const { data: assData } = await supabaseClient.from('assuntos').select('*');
  if (assData) { assuntosMap = {}; assData.forEach(r => { assuntosMap[r.nome] = r.valor; }); }
  if (Object.keys(assuntosMap).length === 0) {
    assuntosMap = { "SUPORTE": 4, "MANUTENÇÃO": 6, "FIBRA": 10 };
  }
  
  // Carregar Cidades
  const { data: cidData } = await supabaseClient.from('cidades').select('*');
  if (cidData) cidades = cidData.map(r => r.nome);
  if (cidades.length === 0) cidades = ["Teresina", "União", "Timon"];
  
  renderizarHome();
}

// ==================== RENDERIZAR HOME (COM FILTRO POR TIPO DE USUÁRIO) ====================
function renderizarHome() {
  // Filtrar técnicos ativos
  let tecnicosVisiveis = tecnicos.filter(t => t.ativo);
  
  // Se for TÉCNICO, mostrar apenas o técnico vinculado
  if (usuarioLogado.tipo === 'tecnico' && usuarioLogado.tecnico_vinculado) {
    tecnicosVisiveis = tecnicosVisiveis.filter(t => t.nome === usuarioLogado.tecnico_vinculado);
  }
  
  // Calcular OS por técnico (para ranking e cards)
  const osPorTecnico = {};
  tecnicosVisiveis.forEach(t => {
    osPorTecnico[t.nome] = dados.filter(os => os.equipe?.some(e => e.includes(t.apelido) || t.nome.includes(e))).length;
  });
  
  // RANKING (mostrar apenas os 3 primeiros, mas se for técnico, mostrar sua posição também)
  const ranking = Object.entries(osPorTecnico).sort((a, b) => b[1] - a[1]).filter(([, q]) => q > 0);
  const rankingList = document.getElementById('rankingList');
  
  if (ranking.length === 0) {
    rankingList.innerHTML = '<p style="text-align:center;color:#666;">Nenhuma O.S registrada</p>';
  } else {
    const medalhas = ['🥇', '🥈', '🥉'];
    let rankingHtml = '';
    
    // Se for técnico, mostrar sua posição se não estiver no top 3
    if (usuarioLogado.tipo === 'tecnico' && usuarioLogado.tecnico_vinculado) {
      const minhaPosicao = ranking.findIndex(([n]) => n === usuarioLogado.tecnico_vinculado);
      if (minhaPosicao >= 3) {
        const [nome, qtd] = ranking[minhaPosicao];
        rankingHtml += `<div class="ranking-item" style="background:#fff9e6;"><span class="ranking-medal">${minhaPosicao + 1}º</span><div style="flex:1;display:flex;justify-content:space-between;"><span>${nome.split(' ')[0]}</span><span class="ranking-value">${qtd} O.S</span></div></div>`;
      }
    }
    
    // Top 3
    rankingHtml += ranking.slice(0, 3).map(([nome, qtd], i) => {
      const t = tecnicos.find(tn => tn.nome === nome);
      return `<div class="ranking-item"><span class="ranking-medal">${medalhas[i]}</span><div style="flex:1;display:flex;justify-content:space-between;"><span>${nome.split(' ')[0]}</span><span class="ranking-value ${t?.funcao==='Líder'?'leader':''}">${qtd} O.S</span></div></div>`;
    }).join('');
    
    rankingList.innerHTML = rankingHtml;
  }
  
  // CARDS DOS TÉCNICOS
  const container = document.getElementById('listaTecnicos');
  const info = tecnicosVisiveis.map(t => ({
    ...t, quantidade: osPorTecnico[t.nome] || 0,
    valorTotal: dados.filter(os => os.equipe?.some(e => e.includes(t.apelido) || t.nome.includes(e)))
      .reduce((sum, os) => sum + (os.comissao / os.equipe.length), 0) + (t.funcao === 'Líder' ? 100 : 0)
  })).sort((a, b) => b.quantidade - a.quantidade);
  
  container.innerHTML = info.map(t => `
    <div class="card ${t.funcao === 'Líder' ? 'lider' : ''}" onclick="abrirPainelTecnico('${t.nome}')">
      <span class="funcao-badge ${t.funcao === 'Líder' ? 'funcao-lider' : 'funcao-auxiliar'}">${t.funcao}</span>
      <h3>${t.nome}</h3>
      <p>📊 ${t.quantidade} OS | 💰 R$ ${t.valorTotal.toFixed(2)}</p>
    </div>
  `).join('');
}

// ==================== PAINEL DO TÉCNICO ====================
function abrirPainelTecnico(nome) {
  tecnicoSelecionado = nome;
  document.getElementById('home').classList.add('hidden');
  document.getElementById('painel').classList.remove('hidden');
  document.getElementById('nomeTecnicoPainel').textContent = nome;
  renderizarPainel();
}

function voltarHome() {
  tecnicoSelecionado = null;
  document.getElementById('painel').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  renderizarHome();
}

function renderizarPainel() {
  const base = dados.filter(os => os.equipe?.some(e => e.includes(tecnicoSelecionado.split(' ')[0]) || tecnicoSelecionado.includes(e)));
  const totalOS = base.length;
  let totalComissao = base.reduce((sum, os) => sum + (os.comissao / os.equipe.length), 0);
  const tecnico = tecnicos.find(t => t.nome === tecnicoSelecionado);
  if (tecnico?.funcao === 'Líder') totalComissao += 100;
  
  // Stats
  const porAssunto = {};
  base.forEach(os => { porAssunto[os.assunto] = (porAssunto[os.assunto] || 0) + 1; });
  
  let statsHtml = `
    <div class="stat-card"><div class="stat-value">${totalOS}</div><div class="stat-label">Total OS</div></div>
    <div class="stat-card"><div class="stat-value">R$ ${totalComissao.toFixed(2)}</div><div class="stat-label">Comissões</div></div>
  `;
  Object.entries(porAssunto).sort((a,b) => b[1] - a[1]).slice(0, 4).forEach(([a, q]) => {
    statsHtml += `<div class="stat-card"><div class="stat-value">${q}</div><div class="stat-label">${a}</div></div>`;
  });
  document.getElementById('statsContainer').innerHTML = statsHtml;
  
  // Tabela
  const tbody = document.getElementById('tbody');
  if (base.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;">Nenhuma OS</td></tr>';
    return;
  }
  
  tbody.innerHTML = base.map((os, i) => `
    <tr>
      <td><input type="checkbox" data-index="${i}" onchange="atualizarEstadoBotoes()"></td>
      <td><strong>${os.id}</strong></td>
      <td>${new Date(os.data+'T00:00:00').toLocaleDateString('pt-BR')}</td>
      <td>${os.assunto}</td>
      <td>${os.cidade||'-'}</td>
      <td>R$ ${(os.comissao/os.equipe.length).toFixed(2)}</td>
      <td>
        <button class="btn-warning" onclick="editarOS('${os.id}')">✏️</button>
        <button class="btn-danger" onclick="excluirOS('${os.id}')">🗑️</button>
      </td>
    </tr>
  `).join('');
  
  document.getElementById('btnExcluirSelecionados').disabled = true;
}

// ==================== CRUD OS ====================
async function abrirFormOS(id = null) {
  // Carregar assuntos e cidades para os selects
  const selAssunto = document.getElementById('osAssuntoSelect');
  selAssunto.innerHTML = '<option value="">Selecione</option>';
  Object.entries(assuntosMap).forEach(([n, v]) => { selAssunto.innerHTML += `<option value="${n}">${n} (R$ ${v})</option>`; });
  selAssunto.onchange = function() { if (this.value) document.getElementById('osComissaoInput').value = assuntosMap[this.value]; };
  
  const selCidade = document.getElementById('osCidadeSelect');
  selCidade.innerHTML = '<option value="">Selecione</option>';
  cidades.forEach(c => { selCidade.innerHTML += `<option value="${c}">${c}</option>`; });
  
  if (id) {
    const os = dados.find(o => o.id === id);
    document.getElementById('tituloOS').textContent = 'Editar OS';
    document.getElementById('editOSId').value = id;
    document.getElementById('osIdInput').value = os.id;
    document.getElementById('osDataInput').value = os.data;
    document.getElementById('osAssuntoSelect').value = os.assunto;
    document.getElementById('osCidadeSelect').value = os.cidade || '';
    document.getElementById('osComissaoInput').value = os.comissao;
  } else {
    document.getElementById('tituloOS').textContent = 'Nova OS';
    document.getElementById('editOSId').value = '';
    document.getElementById('osIdInput').value = '';
    document.getElementById('osDataInput').value = new Date().toISOString().split('T')[0];
    document.getElementById('osComissaoInput').value = '';
  }
  document.getElementById('modalOS').classList.remove('hidden');
}

function fecharModalOS() { document.getElementById('modalOS').classList.add('hidden'); }

async function salvarOS() {
  const id = document.getElementById('osIdInput').value.trim();
  const data = document.getElementById('osDataInput').value;
  const assunto = document.getElementById('osAssuntoSelect').value;
  const cidade = document.getElementById('osCidadeSelect').value;
  const comissao = parseFloat(document.getElementById('osComissaoInput').value) || 0;
  const editId = document.getElementById('editOSId').value;
  
  if (!id || !data || !assunto) return alert('Preencha todos os campos');
  
  showLoading('Salvando...');
  
  const os = { id, data, equipe: [tecnicoSelecionado.split(' ')[0]], assunto, cidade, comissao };
  
  if (editId) {
    await supabaseClient.from('os').update({ id, equipe: os.equipe.join(' / '), assunto, data, cidade, comissao }).eq('id', editId);
    const idx = dados.findIndex(o => o.id === editId);
    if (idx >= 0) dados[idx] = os;
  } else {
    await supabaseClient.from('os').insert({ id, equipe: os.equipe.join(' / '), assunto, data, cidade, comissao });
    dados.push(os);
  }
  
  dados.sort((a, b) => new Date(b.data) - new Date(a.data));
  renderizarPainel();
  fecharModalOS();
  hideLoading();
}

function editarOS(id) { abrirFormOS(id); }

async function excluirOS(id) {
  if (!confirm('Excluir esta OS?')) return;
  await supabaseClient.from('os').delete().eq('id', id);
  dados = dados.filter(o => o.id !== id);
  renderizarPainel();
}

function selecionarTodos(m) { document.querySelectorAll('#tbody input[type="checkbox"]').forEach(c => c.checked = m.checked); atualizarEstadoBotoes(); }

function atualizarEstadoBotoes() {
  const algum = Array.from(document.querySelectorAll('#tbody input[type="checkbox"]')).some(c => c.checked);
  document.getElementById('btnExcluirSelecionados').disabled = !algum;
}

async function excluirSelecionados() {
  const checks = document.querySelectorAll('#tbody input[type="checkbox"]:checked');
  if (!checks.length) return alert('Selecione OS');
  if (!confirm(`Excluir ${checks.length} OS?`)) return;
  
  for (const cb of checks) {
    const row = cb.closest('tr');
    const id = row.querySelector('td:nth-child(2) strong').textContent;
    await supabaseClient.from('os').delete().eq('id', id);
    dados = dados.filter(o => o.id !== id);
  }
  renderizarPainel();
}

async function carregarListasConfig() {
  // Técnicos
  const listaTec = document.getElementById('listaTecnicosConfig');
  listaTec.innerHTML = tecnicos.map(t => `
    <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;">
      <div><strong>${t.nome}</strong> <span style="background:${t.ativo?'#28a745':'#dc3545'};color:white;padding:2px 8px;border-radius:12px;">${t.ativo?'Ativo':'Inativo'}</span></div>
      <div>
        <button class="btn-warning" onclick="editarTecnico('${t.nome}')">✏️</button>
        <button class="${t.ativo?'btn-secondary':'btn-success'}" onclick="toggleTecnico('${t.nome}')">${t.ativo?'🔴':'🟢'}</button>
        <button class="btn-danger" onclick="excluirTecnico('${t.nome}')">🗑️</button>
      </div>
    </div>
  `).join('');
  
  // Assuntos
  const listaAss = document.getElementById('listaAssuntosConfig');
  listaAss.innerHTML = Object.entries(assuntosMap).map(([n, v]) => `
    <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;">
      <div><strong>${n}</strong> - R$ ${v.toFixed(2)}</div>
      <div><button class="btn-warning" onclick="editarAssunto('${n}')">✏️</button><button class="btn-danger" onclick="excluirAssunto('${n}')">🗑️</button></div>
    </div>
  `).join('');
  
  // Cidades
  const listaCid = document.getElementById('listaCidadesConfig');
  listaCid.innerHTML = cidades.map(c => `
    <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;">
      <div><strong>${c}</strong></div>
      <div><button class="btn-warning" onclick="editarCidade('${c}')">✏️</button><button class="btn-danger" onclick="excluirCidade('${c}')">🗑️</button></div>
    </div>
  `).join('');
  
  // Usuários
  const listaUsr = document.getElementById('listaUsuariosConfig');
  listaUsr.innerHTML = usuarios.map(u => `
    <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;">
      <div><strong>${u.usuario}</strong> (${u.tipo})</div>
      <div><button class="btn-warning" onclick="editarUsuario('${u.usuario}')">✏️</button><button class="btn-danger" onclick="excluirUsuario('${u.usuario}')">🗑️</button></div>
    </div>
  `).join('');
}

// ==================== CRUD TÉCNICOS ====================
function abrirFormTecnico(nome = null) {
  document.getElementById('tituloTecnico').textContent = nome ? 'Editar Técnico' : 'Novo Técnico';
  document.getElementById('nomeTecnicoInput').value = nome || '';
  document.getElementById('funcaoTecnicoSelect').value = nome ? tecnicos.find(t => t.nome === nome)?.funcao || 'Auxiliar' : 'Auxiliar';
  document.getElementById('editTecnicoNome').value = nome || '';
  document.getElementById('modalTecnico').classList.remove('hidden');
}
function fecharModalTecnico() { document.getElementById('modalTecnico').classList.add('hidden'); }
async function salvarTecnico() {
  const nome = document.getElementById('nomeTecnicoInput').value.trim().toUpperCase();
  const funcao = document.getElementById('funcaoTecnicoSelect').value;
  const editNome = document.getElementById('editTecnicoNome').value;
  if (!nome) return alert('Digite o nome');
  const tecnico = { nome, ativo: true, funcao, apelido: nome.split(' ')[0] };
  if (editNome) await supabaseClient.from('tecnicos').update(tecnico).eq('nome', editNome);
  else await supabaseClient.from('tecnicos').insert(tecnico);
  await carregarDadosIniciais();
  carregarListasConfig();
  fecharModalTecnico();
}
function editarTecnico(nome) { abrirFormTecnico(nome); }
async function toggleTecnico(nome) {
  const t = tecnicos.find(tn => tn.nome === nome);
  await supabaseClient.from('tecnicos').update({ ativo: !t.ativo }).eq('nome', nome);
  await carregarDadosIniciais();
  carregarListasConfig();
}
async function excluirTecnico(nome) {
  if (!confirm(`Excluir ${nome}?`)) return;
  await supabaseClient.from('tecnicos').delete().eq('nome', nome);
  await carregarDadosIniciais();
  carregarListasConfig();
}

// ==================== CRUD USUÁRIOS ====================
async function abrirFormUsuario(usuario = null) {
  document.getElementById('tituloUsuario').textContent = usuario ? 'Editar Usuário' : 'Novo Usuário';
  document.getElementById('usuarioInput').value = usuario || '';
  document.getElementById('senhaInput').value = '';
  if (usuario) {
    const u = usuarios.find(us => us.usuario === usuario);
    document.getElementById('tipoUsuarioSelect').value = u.tipo || 'tecnico';
  }
  const select = document.getElementById('tecnicoVinculadoSelect');
  select.innerHTML = '<option value="">Nenhum</option>';
  tecnicos.forEach(t => { select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`; });
  if (usuario) {
    const u = usuarios.find(us => us.usuario === usuario);
    select.value = u.tecnico_vinculado || '';
  }
  document.getElementById('editUsuarioNome').value = usuario || '';
  document.getElementById('modalUsuario').classList.remove('hidden');
}
function fecharModalUsuario() { document.getElementById('modalUsuario').classList.add('hidden'); }
async function salvarUsuario() {
  const usuario = document.getElementById('usuarioInput').value.trim();
  const senha = document.getElementById('senhaInput').value;
  const tipo = document.getElementById('tipoUsuarioSelect').value;
  const tecnicoVinculado = document.getElementById('tecnicoVinculadoSelect').value;
  const editUsuario = document.getElementById('editUsuarioNome').value;
  if (!usuario) return alert('Digite o usuário');
  if (!editUsuario && !senha) return alert('Digite a senha');
  const userData = { usuario, tipo, tecnico_vinculado: tecnicoVinculado || null };
  if (senha) userData.senha = senha;
  if (editUsuario) await supabaseClient.from('usuarios').update(userData).eq('usuario', editUsuario);
  else await supabaseClient.from('usuarios').insert(userData);
  const { data } = await supabaseClient.from('usuarios').select('*');
  if (data) usuarios = data;
  carregarListasConfig();
  fecharModalUsuario();
}
function editarUsuario(usuario) { abrirFormUsuario(usuario); }
async function excluirUsuario(usuario) {
  if (usuario === 'admin') return alert('Admin não pode ser excluído!');
  if (!confirm(`Excluir ${usuario}?`)) return;
  await supabaseClient.from('usuarios').delete().eq('usuario', usuario);
  const { data } = await supabaseClient.from('usuarios').select('*');
  if (data) usuarios = data;
  carregarListasConfig();
}
